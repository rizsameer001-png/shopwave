<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><meta name="theme-color" content="#6C63FF"/><meta name="description" content="ShopWave - Your ultimate shopping destination"/><title>ShopWave 🛍️</title><link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Poppins,sans-serif;background:#f8f9fa;color:#2d2d2d}:root{--primary:#6C63FF;--secondary:#FF6584;--accent:#43E97B;--dark:#1A1A2E;--light:#f8f9fa;--border:#e8e8e8;--shadow:0 4px 20px rgba(0,0,0,0.08);--radius:16px}.btn{padding:12px 28px;border-radius:12px;border:none;cursor:pointer;font-family:Poppins,sans-serif;font-weight:600;font-size:14px;transition:all .2s}.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:#5a52e0;transform:translateY(-1px);box-shadow:0 6px 20px rgba(108,99,255,.4)}.btn-secondary{background:0 0;color:var(--primary);border:2px solid var(--primary)}.btn-secondary:hover{background:var(--primary);color:#fff}.btn-danger{background:#e53e3e;color:#fff}.btn-sm{padding:8px 18px;font-size:12px;border-radius:10px}.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow)}.badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}.badge-primary{background:rgba(108,99,255,.1);color:var(--primary)}.badge-success{background:rgba(67,233,123,.15);color:#22a63e}.badge-danger{background:rgba(229,62,62,.1);color:#e53e3e}.badge-warning{background:rgba(237,137,54,.1);color:#dd6b20}.spinner{width:40px;height:40px;border:3px solid #f3f3f3;border-top:3px solid var(--primary);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track
